<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>توقيع السائق - التخزين التلقائي</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Arial', 'Tahoma', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      touch-action: manipulation;
    }
    
    .container {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    
    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    
    .canvas-container {
      position: relative;
      display: inline-block;
      width: 100%;
      margin-bottom: 20px;
    }
    
    canvas {
      border: 3px solid #667eea;
      border-radius: 10px;
      background-color: #fafafa;
      touch-action: none;
      width: 100%;
      height: auto;
      max-width: 400px;
      cursor: crosshair;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    
    .canvas-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ccc;
      font-size: 16px;
      pointer-events: none;
      opacity: 0.7;
    }
    
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 1;
      min-width: 140px;
      touch-action: manipulation;
    }
    
    .clear-btn {
      background: linear-gradient(45deg, #ff6b6b, #ee5a52);
      color: white;
    }
    
    .clear-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
    }
    
    .save-btn {
      background: linear-gradient(45deg, #51cf66, #40c057);
      color: white;
    }
    
    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(81, 207, 102, 0.4);
    }
    
    .save-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .signature-info {
      margin-top: 15px;
      padding: 10px;
      background: #f8f9ff;
      border-radius: 8px;
      font-size: 14px;
      color: #666;
    }
    
    .status-message {
      margin-top: 10px;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .status-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .auto-save-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      font-size: 14px;
      color: #28a745;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .auto-save-indicator.visible {
      opacity: 1;
    }
    
    .auto-save-dot {
      width: 10px;
      height: 10px;
      background-color: #28a745;
      border-radius: 50%;
      margin-left: 5px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 15px;
        margin: 5px;
      }
      
      h1 {
        font-size: 20px;
      }
      
      canvas {
        height: 180px;
      }
      
      button {
        font-size: 14px;
        padding: 10px 15px;
        min-width: 120px;
      }
      
      .buttons {
        flex-direction: column;
        align-items: center;
      }
      
      button {
        width: 100%;
        max-width: 200px;
      }
    }
    
    @media (orientation: landscape) and (max-height: 500px) {
      body {
        justify-content: flex-start;
        padding-top: 10px;
      }
      
      .container {
        margin-top: 10px;
      }
      
      canvas {
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>توقيع السائق - التخزين التلقائي</h1>
    <div class="canvas-container">
      <canvas id="signatureCanvas" width="400" height="200"></canvas>
      <div class="canvas-overlay" id="canvasOverlay">اضغط هنا لبدء التوقيع</div>
    </div>
    
    <div class="auto-save-indicator" id="autoSaveIndicator">
      <span>يتم الحفظ تلقائياً</span>
      <div class="auto-save-dot"></div>
    </div>
    
    <div class="buttons">
      <button class="clear-btn" onclick="clearSignature()">
        🗑️ مسح التوقيع
      </button>
      <button class="save-btn" id="saveBtn" onclick="finalizeSignature()">
        💾 إنهاء والحفظ
      </button>
    </div>
    
    <div class="signature-info">
      💡 يتم حفظ توقيعك تلقائياً أثناء الرسم
    </div>
    
    <div class="status-message" id="statusMessage"></div>
  </div>

  <script>
    // كائن شامل لإدارة التوقيعات
    const signatureManager = {
      // حفظ التوقيع في الذاكرة
      savedSignature: null,
      autoSaveEnabled: true,
      lastSaveTime: null,
      
      // حفظ التوقيع
      save: function(dataURL) {
        try {
          // تحويل Data URL إلى Blob
          const blob = this.dataURLToBlob(dataURL);
          this.savedSignature = blob;
          this.lastSaveTime = new Date();
          return true;
        } catch (error) {
          console.error('Error saving signature:', error);
          return false;
        }
      },
      
      // استرجاع التوقيع
      get: function() {
        return this.savedSignature;
      },
      
      // مسح التوقيع المحفوظ
      clear: function() {
        this.savedSignature = null;
        this.lastSaveTime = null;
      },
      
      // التحقق من وجود توقيع محفوظ
      hasSignature: function() {
        return this.savedSignature !== null;
      },
      
      // تحويل Data URL إلى Blob
      dataURLToBlob: function(dataURL) {
        const parts = dataURL.split(';base64,');
        const contentType = parts[0].split(':')[1];
        const raw = window.atob(parts[1]);
        const uInt8Array = new Uint8Array(raw.length);
        
        for (let i = 0; i < raw.length; ++i) {
          uInt8Array[i] = raw.charCodeAt(i);
        }
        
        return new Blob([uInt8Array], { type: contentType });
      },
      
      // تحويل Blob إلى Data URL (للعرض)
      blobToDataURL: function(blob, callback) {
        const reader = new FileReader();
        reader.onload = function() {
          callback(reader.result);
        };
        reader.readAsDataURL(blob);
      },
      
      // تمكين/تعطيل الحفظ التلقائي
      setAutoSave: function(enabled) {
        this.autoSaveEnabled = enabled;
      }
    };

    const canvas = document.getElementById('signatureCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('canvasOverlay');
    const saveBtn = document.getElementById('saveBtn');
    const statusMessage = document.getElementById('statusMessage');
    const autoSaveIndicator = document.getElementById('autoSaveIndicator');
    
    let drawing = false;
    let hasSignature = false;
    let autoSaveTimeout = null;
    let lastX = 0;
    let lastY = 0;
    
    // إعداد خصائص الرسم
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // منع التمرير عند اللمس على Canvas
    document.body.addEventListener('touchstart', function(e) {
      if (e.target === canvas) {
        e.preventDefault();
      }
    }, { passive: false });
    
    document.body.addEventListener('touchend', function(e) {
      if (e.target === canvas) {
        e.preventDefault();
      }
    }, { passive: false });
    
    document.body.addEventListener('touchmove', function(e) {
      if (e.target === canvas) {
        e.preventDefault();
      }
    }, { passive: false });
    
    // الحصول على إحداثيات النقطة
    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      let clientX, clientY;
      
      if (e.type.includes('touch')) {
        clientX = e.touches[0]?.clientX || e.changedTouches[0]?.clientX;
        clientY = e.touches[0]?.clientY || e.changedTouches[0]?.clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }
    
    // حفظ تلقائي للتوقيع
    function autoSaveSignature() {
      if (!hasSignature || !signatureManager.autoSaveEnabled) return;
      
      try {
        const dataURL = canvas.toDataURL('image/png');
        signatureManager.save(dataURL);
        
        // إظهار مؤشر الحفظ
        autoSaveIndicator.classList.add('visible');
        
        // إخفاء المؤشر بعد ثانيتين
        clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(() => {
          autoSaveIndicator.classList.remove('visible');
        }, 2000);
        
      } catch (error) {
        console.error('Auto-save error:', error);
      }
    }
    
    // بداية الرسم
    function startDrawing(e) {
      drawing = true;
      hasSignature = true;
      overlay.style.display = 'none';
      const pos = getPointerPos(e);
      lastX = pos.x;
      lastY = pos.y;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.stroke();
      updateSaveButton();
      
      // حفظ أولي
      autoSaveSignature();
    }
    
    // الرسم
    function draw(e) {
      if (!drawing) return;
      const pos = getPointerPos(e);
      
      // رسم خط أكثر سلاسة
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      
      lastX = pos.x;
      lastY = pos.y;
      
      // حفظ تلقائي أثناء الرسم
      autoSaveSignature();
    }
    
    // إنهاء الرسم
    function stopDrawing() {
      if (drawing) {
        drawing = false;
        // حفظ نهائي عند التوقف عن الرسم
        autoSaveSignature();
      }
    }
    
    // أحداث الماوس
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    
    // أحداث اللمس
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);
    
    // تحديث حالة زر الحفظ
    function updateSaveButton() {
      saveBtn.disabled = !hasSignature;
    }
    
    // مسح التوقيع
    function clearSignature() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSignature = false;
      overlay.style.display = 'block';
      updateSaveButton();
      signatureManager.clear();
      autoSaveIndicator.classList.remove('visible');
      showStatus('تم مسح التوقيع', 'success');
    }
    
    // إنهاء والحفظ النهائي
    function finalizeSignature() {
      if (!hasSignature) {
        showStatus('يرجى إضافة التوقيع أولاً', 'error');
        return;
      }
      
      try {
        // حفظ نهائي
        const dataURL = canvas.toDataURL('image/png');
        signatureManager.save(dataURL);
        
        showStatus('تم حفظ التوقيع بنجاح!', 'success');
        
        // العودة للصفحة السابقة بعد ثانيتين
        setTimeout(() => {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            showStatus('التوقيع محفوظ ومتاح للاستخدام', 'success');
          }
        }, 2000);
        
      } catch (error) {
        showStatus('حدث خطأ أثناء حفظ التوقيع', 'error');
        console.error('Save error:', error);
      }
    }
    
    // عرض رسائل الحالة
    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status-message status-${type}`;
      statusMessage.style.opacity = '1';
      
      setTimeout(() => {
        statusMessage.style.opacity = '0';
      }, 3000);
    }
    
    // تحميل التوقيع المحفوظ مسبقاً إذا وجد
    function loadSavedSignature() {
      if (signatureManager.hasSignature()) {
        signatureManager.blobToDataURL(signatureManager.get(), function(dataURL) {
          const img = new Image();
          img.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            hasSignature = true;
            overlay.style.display = 'none';
            updateSaveButton();
          };
          img.src = dataURL;
        });
      }
    }
    
    // تهيئة الحالة الأولية
    updateSaveButton();
    loadSavedSignature();
    
    // التعامل مع تغيير اتجاه الشاشة
    window.addEventListener('orientationchange', function() {
      setTimeout(() => {
        // إعادة رسم التوقيع بعد تغيير الاتجاه
        loadSavedSignature();
      }, 100);
    });
  </script>
</body>
</html>
