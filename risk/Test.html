<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Risk Assessment Report - Ganoub Elwady Safety</title>

<script src="/libs/jspdf.umd.min.js"></script>
<script src="/libs/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body, .cell-content, .risk-matrix td, .info-table td, .company-name,
.footer-note, .risk-evaluation-title, h3, .btn-pdf, .risk-value,
.info-table .value-cell, .risk-matrix .desc-cell span {
    font-family:  Arial, sans-serif;
}

body {
    margin: 0;
    padding: 10px;
    background: #e9ecef;
}

/* ===== Toolbar ===== */
.pdf-toolbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    position: sticky;
    top: 10px;
    z-index: 1000;
    padding: 5px;
}

.btn-pdf {
    background-color: #d32f2f;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex: 1;
    min-width: 110px;
    text-align: center;
    transition: transform 0.1s;
}
.btn-pdf:active { transform: scale(0.97); }
.btn-back  { background-color: #666; }
.btn-share { background-color: #2196F3; }
.btn-home  { background-color: #27ae60; }

/* ===== Page Styling ===== */
.pdf-page {
    background: white;
    width: 277mm;
    height: 190mm;
    margin: 0 auto 20px auto;
    border: 1px solid #bbb;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    padding: 6mm 5mm;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== Header ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3mm;
    border-bottom: 2px solid #d32f2f;
    padding-bottom: 2mm;
    flex-shrink: 0;
}

.logo { width: auto; height: auto; }

.company-name {
    text-align: right;
    font-size: 13px;
    font-weight: bold;
    color: #000000;
    flex-grow: 1;
    padding-right: 2mm;
}

/* ===== Info Table ===== */
.info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 4px;
    flex-shrink: 0;
}

.info-table td {
    padding: 4px 7px;
    font-size: 11px;
    border: 1px solid #999;
    vertical-align: middle;
}

.info-table .label-cell {
    background: #f0f0f0;
    font-weight: bold;
    width: 14%;
    color: #333;
    text-align: center;
    
}

.info-table .value-cell {
    width: 22%;
    text-align: left;
    direction: ltr;
    font-size: 15px;
}

/* ===== Risk Matrix ===== */
h3 {
    margin: 5px 0 4px 0;
    font-size: 15px;
    text-align: center;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    font-weight: bold;
}

.risk-matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    direction: ltr;
    flex-shrink: 0;
    text-align: center;
    table-layout: fixed;
}
/* widths for matrix columns */
.risk-matrix th:nth-child(1),
.risk-matrix td:nth-child(1) {
    width: 12%;
}

.risk-matrix th:nth-child(2),
.risk-matrix td:nth-child(2) {
    width: 50%;   /* شرح الخطر */
}

.risk-matrix th:nth-child(3),
.risk-matrix td:nth-child(3) {
    width: 6%;
}

.risk-matrix th:nth-child(4),
.risk-matrix td:nth-child(4),
.risk-matrix th:nth-child(5),
.risk-matrix td:nth-child(5),
.risk-matrix th:nth-child(6),
.risk-matrix td:nth-child(6),
.risk-matrix th:nth-child(7),
.risk-matrix td:nth-child(7),
.risk-matrix th:nth-child(8),
.risk-matrix td:nth-child(8) {
    width: 6%;
}

.risk-matrix th,
.risk-matrix td {
    border: 1px solid #666;
    padding: 3px 2px;
    text-align: center;
    vertical-align: middle;
}

.risk-matrix th { font-weight: bold; background: #e8e8e8; }
.risk-matrix .desc-cell { text-align: left; padding: 3px 5px; line-height: 1.3; }

.risk-matrix .desc-cell span {
    display: block;
    margin-top: 3px;
    direction: rtl;
    text-align: right;
    font-size: 12px;
    font-weight: bold;
}

/* ===== Footer ===== */
.footer-note {
    font-size: 7px;
    margin-top: auto;
    padding-top: 4px;
    text-align: center;
    color: #777;
    border-top: 1px solid #ddd;
    flex-shrink: 0;
}

/* ===== Risk Evaluation Page ===== */
.risk-evaluation-title {
    text-align: center;
    margin: 2mm 0;
    font-weight: bold;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
}

.eval-table-wrapper {
    flex: 1;
    overflow: visible;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.risk-evaluation-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    direction: ltr;
    font-size: 12px;
    height: 100%;
    font-weight: bold;
}

.risk-evaluation-table th,
.risk-evaluation-table td {
    border: 1px solid #666;
    padding: 6px 4px;
    text-align: center;
    vertical-align: middle;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.risk-evaluation-table tbody tr {
    height: calc((100% - 40px) / 5);
}

.risk-evaluation-table thead th {
    background: #e8e8e8;
    font-weight: bold;
    vertical-align: middle;
}

/* Column widths */
.col-hazard   { width: 11%; }
.col-exposed  { width: 9%;  }
.col-harm     { width: 9%;  }
.col-existing { width: 14%; }
.col-sev      { width: 4%;  }
.col-like     { width: 4%;  }
.col-rate     { width: 5%;  }
.col-add      { width: 16%; }
.col-nsev     { width: 4%;  }
.col-nlike    { width: 4%;  }
.col-nrate    { width: 5%;  }
.col-resp     { width: 15%; }

.cell-content {
    white-space: pre-wrap;
    line-height: 1.4;
    text-align: center;
    direction: rtl;
    display: block;
    font-weight: 500;
    font-weight: bold;
}

/* ===== Risk Colors ===== */
//*.risk-low      { background-color: #90EE90 !important; color: #000; }
.risk-medium   { background-color: #FFFF66 !important; color: #000; }
.risk-high     { background-color: #FFB347 !important; color: #000; }
.risk-critical { background-color: #FF3333 !important; color: #fff; }

.risk-value {
    font-weight: bold;
    font-size: 10px;
    text-align: center;
    border-radius: 3px;
    padding: 2px 1px;
    display: block;
    width: 100%;
    direction: ltr;
}

/* ===== Toast ===== */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #27ae60;
    color: white;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 11px;
    z-index: 2000;
    animation: fadeInOut 2.5s ease;
    white-space: nowrap;
}

@keyframes fadeInOut {
    0%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    85%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
}

@media print {
    body { margin: 0; padding: 0; background: white; }
    .pdf-toolbar { display: none; }
    .pdf-page {
        width: 277mm;
        height: 190mm;
        page-break-after: always;
        break-after: page;
        border: none;
        box-shadow: none;
        margin: 0;
    }
    .pdf-page:last-child { page-break-after: auto; break-after: auto; }
    @page { size: A4 landscape; margin: 10mm; }
}

@media (max-width: 768px) {
    .pdf-page { width: 100%; height: auto; }
    .btn-pdf { padding: 10px 12px; font-size: 12px; min-width: 90px; }
}
</style>
</head>
<body>

<div class="pdf-toolbar">
    <button class="btn-pdf btn-home" onclick="goToHome()">🏠 الرئيسية</button>
    <button class="btn-pdf btn-back" onclick="goBackToQuestions()">← رجوع</button>
    <button class="btn-pdf" id="generatePDFBtn">📄 حفظ PDF</button>
    <button class="btn-pdf btn-share" id="sharePDFBtn">📤 مشاركة</button>
</div>

<div id="reportContainer"></div>

<script>
/* ════════════════════════════════════════════
   CONFIG & DATA LOADING
════════════════════════════════════════════ */
const LOGO_URL = "/assets/logo.png";

let siteData     = {};
let sessionData  = {};
let hazardReport = [];

try { const s = localStorage.getItem('siteData'); if (s) siteData = JSON.parse(s); } catch(e) {}
try { const s = localStorage.getItem('currentSessionData'); if (s) sessionData = JSON.parse(s); } catch(e) {}
try {
    const s = localStorage.getItem('riskAssessmentReportData') || localStorage.getItem('riskAssessmentData');
    if (s) { const d = JSON.parse(s); hazardReport = d.hazardReport || d.unsafeHazards || []; }
} catch(e) {}

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function esc(t) {
    if (t == null || t === '') return '';
    return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function getRiskClass(v) {
    const n = Number(v);
    if (!v || isNaN(n)) return '';
    if (n <= 2)  return 'risk-low';
    if (n <= 6)  return 'risk-medium';
    if (n <= 12) return 'risk-high';
    return 'risk-critical';
}

const today = new Date();
const dateSuffix = String(today.getDate()).padStart(2,'0') + String(today.getMonth()+1).padStart(2,'0');
const siteCodeClean = (siteData.siteCode || 'Unknown').replace(/[^a-zA-Z0-9_-]/g,'_');
const pdfFileName = `Site_Risk_${siteCodeClean}_${dateSuffix}.pdf`;
const currentDateDisplay = today.toLocaleDateString('en-GB');
const technicianName = sessionData.fullname || siteData.fullname || ' ';
const activityTypeDisplay = siteData.activityType === 'tower' ? 'يتضمن برج' : (siteData.activityType === 'noTower' ? 'لا يتضمن برج' : ' ');

/* ════════════════════════════════════════════
   HEADER SNIPPET
════════════════════════════════════════════ */
function headerHTML() {
    return `
        <div class="header">
            <img src="${LOGO_URL}" alt="Logo" class="logo" onerror="this.style.display='none';">
            <div class="company-name">Ganoub Alwadi for Petroleum Service</div>
        </div>`;
}

/* ════════════════════════════════════════════
   PAGE 1   Info Table + Risk Matrix
════════════════════════════════════════════ */
function buildPage1() {
    return `
    <div class="pdf-page" id="page1">
        ${headerHTML()}

        <table class="info-table" dir="ltr">
            <tr><td class="label-cell">Contractor</td><td class="value-cell">${esc(siteData.contractor || ' ')}</td>
                <td class="label-cell">Date</td><td class="value-cell">${currentDateDisplay}</td></tr>
            <tr><td class="label-cell">Site ID</td><td class="value-cell">${esc(siteData.siteCode || ' ')}</td>
                <td class="label-cell">Site Name</td><td class="value-cell">${esc(siteData.siteName || ' ')}</td></tr>
            <tr><td class="label-cell">Site Type</td><td class="value-cell">${esc(siteData.siteType || ' ')}</td>
                <td class="label-cell">Office</td><td class="value-cell">${esc(siteData.office || ' ')}</td></tr>
            <tr><td class="label-cell">Activity</td><td class="value-cell">${activityTypeDisplay}</td>
                <td class="label-cell">Assessor</td><td class="value-cell">${esc(technicianName)}</td></tr>
            <tr><td class="label-cell">Title</td><td class="value-cell">${esc(sessionData.jobTitle || ' ')}</td>
                <td class="label-cell">Signature</td><td class="value-cell">&nbsp;</td></tr>
        </table>

        <h3>Risk Assessment Matrix</h3>
        <table class="risk-matrix" dir="ltr">
            <thead><tr><th>Risk Level</th><th class="desc-cell">Explanation</th><th>S/L</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><tr></thead>
            <tbody>
                <tr><th style="background:#4CAF50;">1–2<br>LOW</th>
                    <td class="desc-cell"style="background:#4CAF50;"><strong>LOW RISK (L) As low as reasonably practicable (ALARP): May be acceptable.  However, attention is required & frequent review  <br><span>مخاطر منخفضة مقبولة عند أدنى مستوى ممكن مع المتابعة الدورية </span></td>
                    <td>1</td><td style="background:#4CAF50;">1</td><td style="background:#4CAF50;">2</td><td style="background:#4CAF50;">3</td><td style="background:#FFEB3B;">4</td><td style="background:#FFEB3B;">5</td></tr>
                <tr><th style="background:#FFEB3B;">3–6<br>ADEQUATE</th>
                    <td class="desc-cell"style="background:#FFEB3B;"><strong>ADEQUATELY CONTROLLED RISK (A) Review task to see if risk can be reduced further.<br><span>مخاطر مُسيطر عليها بشكل كاف تُراجع المهمة لبحث إمكانية تقليل الخطر أكثر .</span></td>
                    <td>2</td><td style="background:#4CAF50;">2</td><td style="background:#FFEB3B;">4</td><td style="background:#FFEB3B;">6</td><td style="background:#FF9800;">8</td><td style="background:#FF9800;">10</td></tr>
                <tr><th style="background:#FF9800;">8–12<br>MODERATE</th>
                    <td class="desc-cell"style="background:#FF9800;"><strong>MODERATELY CONTROLLED RISK (M) Further Risk Reduction Measures should be considered.<br><span> مخاطر مُسيطر عليها بدرجة متوسطة يجب النظر في اتخاذ إجراءات إضافية لتقليل الخطر</span></td>
                    <td>3</td><td style="background:#FFEB3B;">3</td><td style="background:#FFEB3B;">6</td><td style="background:#FF9800;">9</td><td style="background:#FF9800;">12</td><td style="background:#FF0000;">15</td></tr>
                <tr><th rowspan="2" style="background:#FF0000;">15–25<br>HIGH</th>
                    <td rowspan="2" class="desc-cell"style="background:#FF0000;"><strong>HIGH RISK (H) Unacceptable, stop the work, Immediate action to reduce risk by re-assessing & applying the controls.<br><span>مخاطر عالية غير مقبولة، يجب إيقاف العمل فورًا واتخاذ إجراءات عاجلة لتقليل الخطر من خلال إعادة التقييم وتطبيق وسائل السيطرة..</span></td>
                    <td>4</td><td style="background:#FFEB3B;">4</td><td style="background:#FF9800;">8</td><td style="background:#FF9800;">12</td><td style="background:#FF0000;">16</td><td style="background:#FF0000;">20</td></tr>
                <tr><td>5</td><td style="background:#FFEB3B;">5</td><td style="background:#FF9800;">10</td><td style="background:#FF0000;">15</td><td style="background:#FF0000;">20</td><td style="background:#FF0000;">25</td></tr>
            </tbody>
        </table>

        <div class="footer-note">Risk = Severity × Likelihood | Page 1 of 2</div>
    </div>`;
}

/* ════════════════════════════════════════════
   PAGE 2   Risk Evaluation Table (5 ROWS)
════════════════════════════════════════════ */
function buildPage2() {
    let rows = '';
    const MAX_ROWS = 5;  // 5 صفوف ثابتة لملء الصفحة
    const list = [];

    // تعبئة أول N صفوف من البيانات الموجودة
    for (let i = 0; i < MAX_ROWS; i++) {
        const h = hazardReport[i] || null;
        list.push(h);
    }

    list.forEach(h => {
        const hazardText = h ? esc(h.hazard || h.hazardDescription || '') : '';
        const exposedText = h ? esc(h.exposed || h.who || '') : '';
        const harmText = h ? esc(h.harm || h.injuryType || '') : '';
        const existingText = h ? esc(h.existingControls || h.controls || '') : '';
        const severityVal = h ? esc(h.severity || (h.initialRisk?.severity) || '') : '';
        const likelihoodVal = h ? esc(h.likelihood || (h.initialRisk?.likelihood) || '') : '';
        const initialRating = h ? (h.initialRating || h.riskValue || h.initialRisk?.value || '') : '';
        const additionalText = h ? esc(h.additionalControls || '') : '';
        const newSeverity = h ? esc(h.newSeverity || (h.residualRisk?.severity) || '') : '';
        const newLikelihood = h ? esc(h.newLikelihood || (h.residualRisk?.likelihood) || '') : '';
        const newRating = h ? (h.newRating || h.residualRisk?.value || '') : '';
        const respText = '';

        const initClass = getRiskClass(initialRating);
        const newClass = getRiskClass(newRating);

        rows += `<tr>
            <td class="col-hazard"><div class="cell-content">${hazardText || ' '}</div></td>
            <td class="col-exposed"><div class="cell-content">${exposedText || ' '}</div></td>
            <td class="col-harm"><div class="cell-content">${harmText || ' '}</div></td>
            <td class="col-existing"><div class="cell-content">${existingText || ' '}</div></td>
            <td class="col-sev"><div class="cell-content">${severityVal || ' '}</div></td>
            <td class="col-like"><div class="cell-content">${likelihoodVal || ' '}</div></td>
            <td class="col-rate ${initClass}"><div class="risk-value">${initialRating || ' '}</div></td>
            <td class="col-add"><div class="cell-content">${additionalText || ' '}</div></td>
            <td class="col-nsev"><div class="cell-content">${newSeverity || ' '}</div></td>
            <td class="col-nlike"><div class="cell-content">${newLikelihood || ' '}</div></td>
            <td class="col-nrate ${newClass}"><div class="risk-value">${newRating || ' '}</div></td>
            <td class="col-resp"><div class="cell-content">${respText || ' '}</div></td>
        </tr>`;
    });

    return `
    <div class="pdf-page" id="page2">
        ${headerHTML()}
        <div class="risk-evaluation-title">Risk Evaluation</div>
        <div class="eval-table-wrapper">
            <table class="risk-evaluation-table" id="evalTable" dir="ltr">
                <colgroup><col class="col-hazard"><col class="col-exposed"><col class="col-harm"><col class="col-existing">
                <col class="col-sev"><col class="col-like"><col class="col-rate"><col class="col-add">
                <col class="col-nsev"><col class="col-nlike"><col class="col-nrate"><col class="col-resp"></colgroup>
                <thead>
                    <tr><th rowspan="2">Hazard</th><th rowspan="2">Exposed</th><th rowspan="2">Harm</th><th rowspan="2">Existing Controls</th>
                        <th colspan="3">Initial Risk</th><th rowspan="2">Additional Controls</th>
                        <th colspan="3">Residual Risk</th><th rowspan="2">Responsible</th></tr>
                    <tr><th>Sev</th><th>Like</th><th>Rate</th><th>Sev</th><th>Like</th><th>Rate</th></tr>
                </thead>
                <tbody>
                    ${rows}
                </tbody>
            </table>
        </div>
        <div class="footer-note">Generated by Ganoub Elwady Safety System | ${today.toLocaleString()} | Page 2 of 2</div>
    </div>`;
}

/* ════════════════════════════════════════════
   RENDER PAGES
════════════════════════════════════════════ */
document.getElementById('reportContainer').innerHTML = buildPage1() + buildPage2();

/* ════════════════════════════════════════════
   DYNAMIC TABLE SCALING - 5 ROWS
════════════════════════════════════════════ */
function scaleEvalTable() {
    const wrapper = document.querySelector('.eval-table-wrapper');
    const table = document.getElementById('evalTable');
    if (!table || !wrapper) return;

    // ضبط ارتفاع الصفوف لتوزيع مساحة بالتساوي
    const rows = table.querySelectorAll('tbody tr');
    if (rows.length === 5) {
        rows.forEach(row => {
            row.style.height = `${100 / 5}%`;
        });
    }

    table.style.fontSize = '8px';
    const cells = table.querySelectorAll('th, td');
    cells.forEach(c => c.style.padding = '4px 3px');
    const contents = table.querySelectorAll('.cell-content');
    contents.forEach(c => { c.style.lineHeight = '1.4'; c.style.fontSize = ''; });

    // تحسين التنسيق لملء الصفحة
const steps = [
    { fs: '12px', cc: '14px', p: '6px 4px', lh: '1.5' },
    { fs: '11px', cc: '13px', p: '5px 4px', lh: '1.45' },
    { fs: '10px', cc: '12px', p: '5px 3px', lh: '1.4' }
];
    for (const step of steps) {
        table.style.fontSize = step.fs;
        cells.forEach(c => c.style.padding = step.p);
        contents.forEach(c => { c.style.lineHeight = step.lh; c.style.fontSize = step.cc; });
        if (table.offsetHeight <= wrapper.offsetHeight) break;
    }
}

setTimeout(scaleEvalTable, 200);
window.addEventListener('resize', scaleEvalTable);

/* ════════════════════════════════════════════
   PDF EXPORT using jsPDF + html2canvas
════════════════════════════════════════════ */
function showToast(msg, bg) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    t.style.backgroundColor = bg || '#27ae60';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2700);
}

function hideButtons() {
    document.querySelectorAll('.pdf-toolbar .btn-pdf').forEach(btn => btn.style.display = 'none');
}

function showButtons() {
    document.querySelectorAll('.pdf-toolbar .btn-pdf').forEach(btn => btn.style.display = 'flex');
}

async function generatePDF() {
    showToast('جاري إنشاء PDF...', '#2196F3');
    hideButtons();

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');

        const page1 = document.getElementById('page1');
        const canvas1 = await html2canvas(page1, { scale: 2.5, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas1.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);

        pdf.addPage();

        const page2 = document.getElementById('page2');
        const canvas2 = await html2canvas(page2, { scale: 2.5, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas2.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);

        pdf.save(pdfFileName);
        showToast(`✅ تم حفظ: ${pdfFileName}`, '#27ae60');
    } catch (err) {
        console.error(err);
        showToast('❌ حدث خطأ', '#e74c3c');
    } finally {
        showButtons();
    }
}

async function sharePDF() {
    showToast('جاري تجهيز الملف...', '#2196F3');
    hideButtons();

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');

        const page1 = document.getElementById('page1');
        const canvas1 = await html2canvas(page1, { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas1.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 210);

        pdf.addPage();

        const page2 = document.getElementById('page2');
        const canvas2 = await html2canvas(page2, { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas2.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 210);

        const blob = pdf.output('blob');
        const file = new File([blob], pdfFileName, { type: 'application/pdf' });

        if (navigator.share && navigator.canShare?.({ files: [file] })) {
            await navigator.share({ title: 'تقرير تقييم المخاطر', files: [file] });
            showToast('✅ تمت المشاركة', '#27ae60');
        } else {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = pdfFileName;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast(`✅ تم حفظ ${pdfFileName}`, '#27ae60');
        }
    } catch (err) {
        console.error(err);
        showToast('❌ حدث خطأ', '#e74c3c');
    } finally {
        showButtons();
    }
}

function goToHome() { window.location.href = '/main.html'; }

document.getElementById('generatePDFBtn').addEventListener('click', generatePDF);
document.getElementById('sharePDFBtn').addEventListener('click', sharePDF);
