<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Risk Assessment Report - Ganoub Elwady Safety</title>

<script src="/libs/jspdf.umd.min.js"></script>
<script src="/libs/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body, .cell-content, .risk-matrix td, .info-table td, .company-name,
.footer-note, .risk-evaluation-title, h3, .btn-pdf, .risk-value,
.info-table .value-cell, .risk-matrix .desc-cell span {
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    padding: 10px;
    background: #e9ecef;
    overflow-x: hidden;
}

.pdf-toolbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 15px;
    position: sticky;
    top: 10px;
    z-index: 1000;
    padding: 5px;
}

.btn-pdf {
    background-color: #d32f2f;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex: 1;
    min-width: 110px;
    text-align: center;
    transition: transform 0.1s;
}
.btn-pdf:active { transform: scale(0.97); }
.btn-back  { background-color: #666; }
.btn-share { background-color: #2196F3; }
.btn-home  { background-color: #27ae60; }

.pdf-page {
    background: white;
    width: 277mm;
    height: 190mm;
    margin: 0 auto 20px auto;
    border: 1px solid #bbb;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    padding: 6mm 5mm;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: absolute;
    left: -9999px;
    top: 0;
    visibility: hidden;
}

.view-page {
    background: white;
    width: 100%;
    margin: 0 auto 16px auto;
    border: 1px solid #bbb;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    padding: 4vw 3vw;
    display: flex;
    flex-direction: column;
    border-radius: 4px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3mm;
    border-bottom: 2px solid #d32f2f;
    padding-bottom: 2mm;
    flex-shrink: 0;
}

.logo { width: auto; height: auto; max-height: 40px; }

.company-name {
    text-align: right;
    font-weight: bold;
    color: #000;
    flex-grow: 1;
    padding-right: 2mm;
    font-size: clamp(10px, 2.5vw, 13px);
}

.info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 4px;
    flex-shrink: 0;
}

.info-table td {
    padding: 3px 5px;
    border: 1px solid #999;
    vertical-align: middle;
    font-size: clamp(8px, 1.8vw, 11px);
}

.info-table .label-cell {
    background: #f0f0f0;
    font-weight: bold;
    width: 14%;
    color: #333;
    text-align: center;
    white-space: nowrap;
}

.info-table .value-cell {
    width: 22%;
    text-align: left;
    direction: ltr;
    font-size: clamp(9px, 2vw, 13px);
}

h3 {
    margin: 5px 0 4px 0;
    font-size: clamp(10px, 2.5vw, 15px);
    text-align: center;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    font-weight: bold;
}

.risk-matrix {
    width: 100%;
    border-collapse: collapse;
    direction: ltr;
    flex-shrink: 0;
    text-align: center;
    table-layout: fixed;
    font-size: clamp(7px, 1.5vw, 12px);
}

.risk-matrix th:nth-child(1),
.risk-matrix td:nth-child(1) { width: 12%; }
.risk-matrix th:nth-child(2),
.risk-matrix td:nth-child(2) { width: 50%; }
.risk-matrix th:nth-child(3),
.risk-matrix td:nth-child(3) { width: 6%; }
.risk-matrix th:nth-child(n+4),
.risk-matrix td:nth-child(n+4) { width: 6%; }

.risk-matrix th,
.risk-matrix td {
    border: 1px solid #666;
    padding: clamp(2px, 0.5vw, 4px) clamp(1px, 0.4vw, 3px);
    text-align: center;
    vertical-align: middle;
}

.risk-matrix th { font-weight: bold; background: #e8e8e8; }
.risk-matrix .desc-cell {
    text-align: left;
    padding: clamp(2px, 0.5vw, 4px) clamp(3px, 0.8vw, 6px);
    line-height: 1.3;
}

.risk-matrix .desc-cell span {
    display: block;
    margin-top: 2px;
    direction: rtl;
    text-align: right;
    font-weight: bold;
    font-size: clamp(6px, 1.4vw, 12px);
}

.footer-note {
    font-size: clamp(6px, 1.2vw, 8px);
    margin-top: auto;
    padding-top: 4px;
    text-align: center;
    color: #777;
    border-top: 1px solid #ddd;
    flex-shrink: 0;
}

.risk-evaluation-title {
    text-align: center;
    margin: 2mm 0;
    font-weight: bold;
    font-size: clamp(11px, 3vw, 16px);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
}

.eval-table-wrapper {
    flex: 1;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
}

.risk-evaluation-table {
    width: 100%;
    min-width: 600px;
    border-collapse: collapse;
    table-layout: fixed;
    direction: ltr;
    font-size: clamp(7px, 1.6vw, 12px);
    font-weight: bold;
}

.risk-evaluation-table th,
.risk-evaluation-table td {
    border: 1px solid #666;
    padding: clamp(3px, 0.7vw, 6px) clamp(2px, 0.5vw, 4px);
    text-align: center;
    vertical-align: middle;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.risk-evaluation-table thead th {
    background: #e8e8e8;
    font-weight: bold;
    vertical-align: middle;
}

.col-hazard   { width: 11%; }
.col-exposed  { width: 9%;  }
.col-harm     { width: 9%;  }
.col-existing { width: 14%; }
.col-sev      { width: 4%;  }
.col-like     { width: 4%;  }
.col-rate     { width: 5%;  }
.col-add      { width: 16%; }
.col-nsev     { width: 4%;  }
.col-nlike    { width: 4%;  }
.col-nrate    { width: 5%;  }
.col-resp     { width: 15%; }

.cell-content {
    white-space: pre-wrap;
    line-height: 1.4;
    text-align: center;
    direction: rtl;
    display: block;
    font-weight: bold;
    font-size: clamp(7px, 1.5vw, 12px);
}

.risk-low      { background-color: #90EE90 !important; color: #000; }
.risk-medium   { background-color: #FFFF66 !important; color: #000; }
.risk-high     { background-color: #FFB347 !important; color: #000; }
.risk-critical { background-color: #FF3333 !important; color: #fff; }

.risk-value {
    font-weight: bold;
    font-size: clamp(8px, 1.8vw, 10px);
    text-align: center;
    border-radius: 3px;
    padding: 2px 1px;
    display: block;
    width: 100%;
    direction: ltr;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #27ae60;
    color: white;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 11px;
    z-index: 2000;
    animation: fadeInOut 2.5s ease;
    white-space: nowrap;
}

@keyframes fadeInOut {
    0%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    85%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
}

@media (max-width: 500px) {
    body { padding: 6px; }
    .btn-pdf { padding: 9px 10px; font-size: 11px; min-width: 0; flex: 1 1 42%; }
    .pdf-toolbar { gap: 6px; }
    .view-page { padding: 3vw 2.5vw; }
    .eval-table-wrapper { overflow-x: auto; }
}

@media print {
    body    { margin: 0; padding: 0; background: white; }
    .pdf-toolbar { display: none; }
    .view-page   { display: none !important; }
    .pdf-page {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        visibility: visible !important;
        display: flex !important;
        width: 277mm;
        height: 190mm;
        page-break-after: always;
        break-after: page;
        border: none;
        box-shadow: none;
        margin: 0;
        overflow: hidden;
    }
    .pdf-page:last-of-type { page-break-after: auto; break-after: auto; }
    @page { size: A4 landscape; margin: 10mm; }
}
</style>
</head>
<body>

<div class="pdf-toolbar">
    <button class="btn-pdf btn-home" onclick="goToHome()">🏠 الرئيسية</button>
    <button class="btn-pdf btn-back" onclick="goBackToQuestions()">← رجوع</button>
    <button class="btn-pdf" id="generatePDFBtn">📄 حفظ PDF</button>
    <button class="btn-pdf btn-share" id="sharePDFBtn">📤 مشاركة</button>
</div>

<div id="reportContainer"></div>

<script>
/* ════════════════════════════════════════════
   CONFIG & DATA — جلب جميع البيانات
════════════════════════════════════════════ */
const LOGO_URL = "/assets/logo.png";

let siteData     = {};
let sessionData  = {};
let allHazards = [];

// استرجاع بيانات الموقع والجلسة
try {
    const s1 = localStorage.getItem('siteData');
    if (s1) siteData = JSON.parse(s1);
} catch(e) { console.error('siteData error:', e); }

try {
    const s2 = localStorage.getItem('currentSessionData');
    if (s2) sessionData = JSON.parse(s2);
} catch(e) { console.error('sessionData error:', e); }

// ✅ الإصلاح الرئيسي: قراءة hazard/exposed/harm/existingControls من assessments مباشرة
try {
    const savedData = localStorage.getItem('riskAssessmentData');
    if (savedData) {
        const data = JSON.parse(savedData);
        
        // ========== المخاطر من الأسئلة غير الآمنة ==========
        const assessments = data.assessments || [];
        const unsafeFromQuestions = assessments
            .filter(a => a && a.answer === 'غير آمن' && !a.isManual)
            .map(a => ({
                // ✅ استخدام البيانات المحفوظة مباشرة من صفحة الأسئلة
                hazard:           a.hazard           || a.question || '',
                exposed:          a.exposed          || '',
                harm:             a.harm             || '',
                existingControls: a.existingControls || '',
                initialRisk:      a.initialRisk,
                residualRisk:     a.residualRisk,
                additionalControls: a.additionalControls || '',
                responsible:      a.responsible || ' ',
                source: 'question'
            }));
        
        // ========== المخاطر اليدوية المضافة ==========
        const manualRisks = data.manualRisks || [];
        const manualFormatted = manualRisks.map(risk => ({
            hazard:           risk.hazard           || '',
            exposed:          risk.exposed          || '',
            harm:             risk.harm             || '',
            existingControls: risk.existingControls || '',
            initialRisk:      risk.initialRisk,
            residualRisk:     risk.residualRisk,
            additionalControls: risk.additionalControls || '',
            responsible:      risk.responsible || ' ',
            source: 'manual'
        }));

        // ✅ التحقق أيضاً من assessments التي تحمل علامة isManual
        const manualFromAssessments = assessments
            .filter(a => a && a.isManual && a.answer === 'غير آمن')
            .map(a => ({
                hazard:           a.hazard           || a.question || '',
                exposed:          a.exposed          || '',
                harm:             a.harm             || '',
                existingControls: a.existingControls || '',
                initialRisk:      a.initialRisk,
                residualRisk:     a.residualRisk,
                additionalControls: a.additionalControls || '',
                responsible:      a.responsible || ' ',
                source: 'manual'
            }));
        
        // دمج جميع المخاطر (مع تجنب التكرار)
        allHazards = [...unsafeFromQuestions, ...manualFormatted];
        
        // إضافة المخاطر اليدوية من assessments إن لم تكن مضافة بالفعل من manualRisks
        if (manualRisks.length === 0 && manualFromAssessments.length > 0) {
            allHazards = [...allHazards, ...manualFromAssessments];
        }
        
        console.log('تم تحميل المخاطر:', allHazards.length);
        console.log('تفاصيل المخاطر:', allHazards);
        
    } else {
        console.log('لا توجد بيانات تقييم مخاطر في localStorage');
    }
} catch(e) { 
    console.error('خطأ في قراءة بيانات المخاطر', e); 
}

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function esc(t) {
    if (t == null || t === '') return ' ';
    return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function getRiskClass(v) {
    const n = Number(v);
    if (!v || isNaN(n)) return '';
    if (n <= 2)  return 'risk-low';
    if (n <= 6)  return 'risk-medium';
    if (n <= 12) return 'risk-high';
    return 'risk-critical';
}

const today = new Date();
const dateSuffix = String(today.getDate()).padStart(2,'0') + String(today.getMonth()+1).padStart(2,'0');
const siteCodeClean = (siteData.siteCode || 'Unknown').replace(/[^a-zA-Z0-9_-]/g,'_');
const pdfFileName = `Site_Risk_${siteCodeClean}_${dateSuffix}.pdf`;
const currentDateDisplay = today.toLocaleDateString('en-GB');
const technicianName = sessionData.fullname || siteData.fullname || ' ';
const activityTypeDisplay = siteData.activityType === 'tower' ? 'يتضمن برج' :
                            siteData.activityType === 'noTower' ? 'لا يتضمن برج' : ' ';

function headerHTML() {
    return `
        <div class="header">
            <img src="${LOGO_URL}" alt="Logo" class="logo" onerror="this.style.display='none';">
            <div class="company-name">Ganoub Alwadi for Petroleum Service</div>
        </div>`;
}

function infoTableHTML() {
    return `
        <table class="info-table" dir="ltr">
            <tr><td class="label-cell">Contractor</td><td class="value-cell">${esc(siteData.contractor || ' ')}</td>
                <td class="label-cell">Date</td><td class="value-cell">${currentDateDisplay}</td>
            </tr>
            <tr><td class="label-cell">Site ID</td><td class="value-cell">${esc(siteData.siteCode || ' ')}</td>
                <td class="label-cell">Site Name</td><td class="value-cell">${esc(siteData.siteName || ' ')}</td>
            </tr>
            <tr><td class="label-cell">Site Type</td><td class="value-cell">${esc(siteData.siteType || ' ')}</td>
                <td class="label-cell">Office</td><td class="value-cell">${esc(siteData.office || ' ')}</td>
            </tr>
            <tr><td class="label-cell">Activity</td><td class="value-cell">${activityTypeDisplay}</td>
                <td class="label-cell">Assessor</td><td class="value-cell">${esc(technicianName)}</td>
            </tr>
            <tr><td class="label-cell">Title</td><td class="value-cell">${esc(sessionData.jobTitle || ' ')}</td>
                <td class="label-cell">Signature</td><td class="value-cell">&nbsp;</td>
            </tr>
        </table>`;
}

function matrixHTML() {
    return `
        <h3>Risk Assessment Matrix</h3>
        <table class="risk-matrix" dir="ltr">
            <thead>
                <tr><th>Risk Level</th><th class="desc-cell">Explanation</th><th>S/L</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                </tr>
            </thead>
            <tbody>
                <tr><th style="background:#4CAF50;">1–2<br>LOW</th>
                    <td class="desc-cell" style="background:#4CAF50;">
                        <strong>LOW RISK (L)</strong> ALARP, acceptable. Attention required.
                        <span>مخاطر منخفضة مقبولة مع المتابعة الدورية</span>
                    </td>
                    <td>1</td><td style="background:#4CAF50;">1</td><td style="background:#4CAF50;">2</td>
                    <td style="background:#FFEB3B;">3</td><td style="background:#FFEB3B;">4</td><td style="background:#FFEB3B;">5</td>
                </tr>
                <tr><th style="background:#FFEB3B;">3–6<br>ADEQUATE</th>
                    <td class="desc-cell" style="background:#FFEB3B;">
                        <strong>ADEQUATELY CONTROLLED RISK (A)</strong> Review task to reduce further.
                        <span>مخاطر مسيطر عليها بشكل كاف – تراجع المهمة لتقليل الخطر</span>
                    </td>
                    <td>2</td><td style="background:#4CAF50;">2</td><td style="background:#FFEB3B;">4</td>
                    <td style="background:#FFEB3B;">6</td><td style="background:#FF9800;">8</td><td style="background:#FF9800;">10</td>
                </tr>
                <tr><th style="background:#FF9800;">8–12<br>MODERATE</th>
                    <td class="desc-cell" style="background:#FF9800;">
                        <strong>MODERATELY CONTROLLED RISK (M)</strong> Further measures considered.
                        <span>مخاطر متوسطة – يجب النظر في إجراءات إضافية</span>
                    </td>
                    <td>3</td><td style="background:#FFEB3B;">3</td><td style="background:#FFEB3B;">6</td>
                    <td style="background:#FF9800;">9</td><td style="background:#FF9800;">12</td><td style="background:#FF0000;">15</td>
                </tr>
                <tr><th rowspan="2" style="background:#FF0000;">15–25<br>HIGH</th>
                    <td rowspan="2" class="desc-cell" style="background:#FF0000;color:#fff;">
                        <strong>HIGH RISK (H)</strong> Unacceptable, stop work immediately.
                        <span style="color:#fff;">مخاطر عالية غير مقبولة – إيقاف العمل فورًا</span>
                    </td>
                    <td>4</td><td style="background:#FFEB3B;">4</td><td style="background:#FF9800;">8</td>
                    <td style="background:#FF9800;">12</td><td style="background:#FF0000;">16</td><td style="background:#FF0000;">20</td>
                </tr>
                <tr><td>5</td><td style="background:#FFEB3B;">5</td><td style="background:#FF9800;">10</td>
                    <td style="background:#FF0000;">15</td><td style="background:#FF0000;">20</td><td style="background:#FF0000;">25</td>
                </tr>
            </tbody>
        </table>`;
}

function evalTableHTML() {
    let rows = '';
    
    if (allHazards.length === 0) {
        rows = `<tr><td colspan="12" style="text-align:center; padding:20px;">⚠️ لا توجد مخاطر مسجلة</td></tr>`;
    } else {
        for (let i = 0; i < allHazards.length; i++) {
            const h = allHazards[i];

            // ✅ القراءة مباشرة من البيانات المحفوظة بدون قيم افتراضية مضللة
            const hazardText    = esc(h.hazard           || '');
            const exposedText   = esc(h.exposed          || '');
            const harmText      = esc(h.harm             || '');
            const existingText  = esc(h.existingControls || '');
            const severityVal   = h.initialRisk ? esc(String(h.initialRisk.severity  || '')) : '';
            const likelihoodVal = h.initialRisk ? esc(String(h.initialRisk.likelihood|| '')) : '';
            const initialRating = h.initialRisk ? (h.initialRisk.value || '') : '';
            const additionalText= esc(h.additionalControls || '');
            const newSeverity   = h.residualRisk ? esc(String(h.residualRisk.severity  || '')) : '';
            const newLikelihood = h.residualRisk ? esc(String(h.residualRisk.likelihood|| '')) : '';
            const newRating     = h.residualRisk ? (h.residualRisk.value || '') : '';
            const responsible   = esc(h.responsible || ' ');

            const initClass = getRiskClass(initialRating);
            const newClass  = getRiskClass(newRating);

            rows += `<tr>
                <td class="col-hazard"><div class="cell-content">${hazardText || ' '}</div></td>
                <td class="col-exposed"><div class="cell-content">${exposedText || ' '}</div></td>
                <td class="col-harm"><div class="cell-content">${harmText || ' '}</div></td>
                <td class="col-existing"><div class="cell-content">${existingText || ' '}</div></td>
                <td class="col-sev"><div class="cell-content">${severityVal || ' '}</div></td>
                <td class="col-like"><div class="cell-content">${likelihoodVal || ' '}</div></td>
                <td class="col-rate ${initClass}"><div class="risk-value">${initialRating || ' '}</div></td>
                <td class="col-add"><div class="cell-content">${additionalText || ' '}</div></td>
                <td class="col-nsev"><div class="cell-content">${newSeverity || ' '}</div></td>
                <td class="col-nlike"><div class="cell-content">${newLikelihood || ' '}</div></td>
                <td class="col-nrate ${newClass}"><div class="risk-value">${newRating || ' '}</div></td>
                <td class="col-resp"><div class="cell-content">${responsible}</div></td>
            </tr>`;
        }
    }
    
    return `
        <colgroup>
            <col class="col-hazard"><col class="col-exposed"><col class="col-harm"><col class="col-existing">
            <col class="col-sev"><col class="col-like"><col class="col-rate"><col class="col-add">
            <col class="col-nsev"><col class="col-nlike"><col class="col-nrate"><col class="col-resp">
        </colgroup>
        <thead>
            <tr>
                <th rowspan="2">Hazard</th><th rowspan="2">Exposed</th><th rowspan="2">Harm</th>
                <th rowspan="2">Existing Controls</th>
                <th colspan="3">Initial Risk</th>
                <th rowspan="2">Additional Controls</th>
                <th colspan="3">Residual Risk</th>
                <th rowspan="2">Responsible</th>
            </tr>
            <tr><th>Sev</th><th>Like</th><th>Rate</th><th>Sev</th><th>Like</th><th>Rate</th></tr>
        </thead>
        <tbody>${rows}</tbody>`;
}

function buildViewPage1() {
    return `
    <div class="view-page">
        ${headerHTML()}
        ${infoTableHTML()}
        ${matrixHTML()}
        <div class="footer-note">Risk = Severity × Likelihood | Page 1 of 2</div>
    </div>`;
}

function buildViewPage2() {
    return `
    <div class="view-page">
        ${headerHTML()}
        <div class="risk-evaluation-title">Risk Evaluation</div>
        <div class="eval-table-wrapper">
            <table class="risk-evaluation-table" dir="ltr">
                ${evalTableHTML()}
            </table>
        </div>
        <div class="footer-note">Generated by Ganoub Elwady Safety System | ${today.toLocaleString()} | Page 2 of 2</div>
    </div>`;
}

function buildPdfPage1() {
    return `
    <div class="pdf-page" id="page1">
        ${headerHTML()}
        ${infoTableHTML()}
        ${matrixHTML()}
        <div class="footer-note">Risk = Severity × Likelihood | Page 1 of 2</div>
    </div>`;
}

function buildPdfPage2() {
    return `
    <div class="pdf-page" id="page2">
        ${headerHTML()}
        <div class="risk-evaluation-title">Risk Evaluation</div>
        <div class="eval-table-wrapper">
            <table class="risk-evaluation-table" id="evalTable" dir="ltr">
                ${evalTableHTML()}
            </table>
        </div>
        <div class="footer-note">Generated by Ganoub Elwady Safety System | ${today.toLocaleString()} | Page 2 of 2</div>
    </div>`;
}

document.getElementById('reportContainer').innerHTML =
    buildViewPage1() + buildViewPage2() +
    buildPdfPage1()  + buildPdfPage2();

function scaleEvalTable() {
    const wrapper = document.querySelector('#page2 .eval-table-wrapper');
    const table   = document.getElementById('evalTable');
    if (!table || !wrapper) return;

    const rowCount = table.querySelectorAll('tbody tr').length;
    
    if (rowCount > 10) {
        table.style.fontSize = '7px';
        const cells = table.querySelectorAll('th, td');
        cells.forEach(c => c.style.padding = '2px 1px');
    } else if (rowCount > 7) {
        table.style.fontSize = '8px';
    } else if (rowCount > 4) {
        table.style.fontSize = '9px';
    } else {
        table.style.fontSize = '10px';
    }
}

setTimeout(scaleEvalTable, 300);
window.addEventListener('resize', scaleEvalTable);

function showToast(msg, bg) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    t.style.backgroundColor = bg || '#27ae60';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2700);
}

function hideButtons() {
    document.querySelectorAll('.pdf-toolbar .btn-pdf').forEach(b => b.style.display = 'none');
}
function showButtons() {
    document.querySelectorAll('.pdf-toolbar .btn-pdf').forEach(b => b.style.display = '');
}

async function generatePDF() {
    showToast('جاري إنشاء PDF...', '#2196F3');
    hideButtons();

    const pdfPages = document.querySelectorAll('.pdf-page');
    pdfPages.forEach(p => {
        p.style.position = 'relative';
        p.style.left = 'auto';
        p.style.top = 'auto';
        p.style.visibility = 'visible';
    });

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');

        const page1 = document.getElementById('page1');
        const canvas1 = await html2canvas(page1, { scale: 2.5, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas1.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);

        pdf.addPage();

        const page2 = document.getElementById('page2');
        const canvas2 = await html2canvas(page2, { scale: 2.5, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas2.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);

        pdf.save(pdfFileName);
        showToast(`✅ تم حفظ: ${pdfFileName}`, '#27ae60');
    } catch (err) {
        console.error(err);
        showToast('❌ حدث خطأ', '#e74c3c');
    } finally {
        pdfPages.forEach(p => {
            p.style.position = 'absolute';
            p.style.left = '-9999px';
            p.style.visibility = 'hidden';
        });
        showButtons();
    }
}

async function sharePDF() {
    showToast('جاري تجهيز الملف...', '#2196F3');
    hideButtons();

    const pdfPages = document.querySelectorAll('.pdf-page');
    pdfPages.forEach(p => {
        p.style.position = 'relative';
        p.style.left = 'auto';
        p.style.top = 'auto';
        p.style.visibility = 'visible';
    });

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');

        const canvas1 = await html2canvas(document.getElementById('page1'), { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas1.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 210);
        pdf.addPage();
        const canvas2 = await html2canvas(document.getElementById('page2'), { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' });
        pdf.addImage(canvas2.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 210);

        const blob = pdf.output('blob');
        const file = new File([blob], pdfFileName, { type: 'application/pdf' });

        if (navigator.share && navigator.canShare?.({ files: [file] })) {
            await navigator.share({ title: 'تقرير تقييم المخاطر', files: [file] });
            showToast('✅ تمت المشاركة', '#27ae60');
        } else {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = pdfFileName;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast(`✅ تم حفظ ${pdfFileName}`, '#27ae60');
        }
    } catch (err) {
        console.error(err);
        showToast('❌ حدث خطأ', '#e74c3c');
    } finally {
        pdfPages.forEach(p => {
            p.style.position = 'absolute';
            p.style.left = '-9999px';
            p.style.visibility = 'hidden';
        });
        showButtons();
    }
}

function goBackToQuestions() { window.location.href = 'make_risk.html'; }
function goToHome() { window.location.href = '/main.html'; }

document.getElementById('generatePDFBtn').addEventListener('click', generatePDF);
document.getElementById('sharePDFBtn').addEventListener('click', sharePDF);
</script>
